<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="inh" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M0,0 L13,7 L0,14 Z" fill="#fff" stroke="#0f172a" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#f8fafc"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    Repository Pattern — Sınıf Hiyerarşisi
  </text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#475569">
    BaseRepository soyut sınıfı, tüm entity repository'leri için ortak CRUD davranışını tanımlar.
  </text>

  <!-- BaseRepository -->
  <g filter="url(#sh)">
    <rect x="320" y="80" width="260" height="180" rx="6" fill="#fff" stroke="#0f172a" stroke-width="2"/>
    <rect x="320" y="80" width="260" height="34" rx="6" fill="#0f172a"/>
    <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" font-style="italic">«abstract» BaseRepository</text>
    <line x1="320" y1="130" x2="580" y2="130" stroke="#94a3b8"/>
    <text x="335" y="148" font-size="11" fill="#0f172a">+ model : db.Model</text>
    <line x1="320" y1="158" x2="580" y2="158" stroke="#94a3b8"/>
    <text x="335" y="178" font-size="11" fill="#0f172a">+ get_by_id(id)</text>
    <text x="335" y="195" font-size="11" fill="#0f172a">+ get_by_id_with_deleted(id)</text>
    <text x="335" y="212" font-size="11" fill="#0f172a">+ get_all(eager_load)</text>
    <text x="335" y="229" font-size="11" fill="#0f172a">+ paginate(page, per_page)</text>
    <text x="335" y="246" font-size="11" fill="#0f172a">+ delete(obj)   « soft »</text>
  </g>

  <!-- MusteriRepository -->
  <g filter="url(#sh)">
    <rect x="40" y="350" width="200" height="170" rx="6" fill="#fff" stroke="#22c55e" stroke-width="2"/>
    <rect x="40" y="350" width="200" height="30" rx="6" fill="#22c55e"/>
    <text x="140" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">MusteriRepository</text>
    <line x1="40" y1="395" x2="240" y2="395" stroke="#94a3b8"/>
    <text x="55" y="412" font-size="10" fill="#0f172a">+ model = Musteri</text>
    <line x1="40" y1="420" x2="240" y2="420" stroke="#94a3b8"/>
    <text x="55" y="438" font-size="10" fill="#0f172a">+ search_full(keyword)</text>
    <text x="55" y="454" font-size="10" fill="#0f172a">+ get_by_vergi_no(vno)</text>
    <text x="55" y="470" font-size="10" fill="#0f172a">+ get_by_email(email)</text>
    <text x="55" y="486" font-size="10" fill="#0f172a">+ get_aktif_musteriler()</text>
    <text x="55" y="502" font-size="10" fill="#0f172a">+ get_by_tip(tip)</text>
  </g>

  <!-- UrunRepository -->
  <g filter="url(#sh)">
    <rect x="260" y="350" width="200" height="170" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="260" y="350" width="200" height="30" rx="6" fill="#f59e0b"/>
    <text x="360" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">UrunRepository</text>
    <line x1="260" y1="395" x2="460" y2="395" stroke="#94a3b8"/>
    <text x="275" y="412" font-size="10" fill="#0f172a">+ model = Urun</text>
    <line x1="260" y1="420" x2="460" y2="420" stroke="#94a3b8"/>
    <text x="275" y="438" font-size="10" fill="#0f172a">+ get_by_kod(kod)</text>
    <text x="275" y="454" font-size="10" fill="#0f172a">+ dusuk_stoklu_urunler()</text>
    <text x="275" y="470" font-size="10" fill="#0f172a">+ search(keyword)</text>
    <text x="275" y="486" font-size="10" fill="#0f172a">+ stok_guncelle(id, miktar)</text>
  </g>

  <!-- SatisFaturaRepository -->
  <g filter="url(#sh)">
    <rect x="480" y="350" width="200" height="170" rx="6" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect x="480" y="350" width="200" height="30" rx="6" fill="#10b981"/>
    <text x="580" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SatisFaturaRepository</text>
    <line x1="480" y1="395" x2="680" y2="395" stroke="#94a3b8"/>
    <text x="495" y="412" font-size="10" fill="#0f172a">+ model = SatisFatura</text>
    <line x1="480" y1="420" x2="680" y2="420" stroke="#94a3b8"/>
    <text x="495" y="438" font-size="10" fill="#0f172a">+ create_with_kalemler()</text>
    <text x="495" y="454" font-size="10" fill="#0f172a">+ tarih_araliginda(b, s)</text>
    <text x="495" y="470" font-size="10" fill="#0f172a">+ musteri_faturalari(id)</text>
    <text x="495" y="486" font-size="10" fill="#0f172a">+ aylik_toplam(yil, ay)</text>
    <text x="495" y="502" font-size="10" fill="#0f172a">+ bekleyen_faturalar()</text>
  </g>

  <!-- AlisFaturaRepository -->
  <g filter="url(#sh)">
    <rect x="700" y="350" width="180" height="170" rx="6" fill="#fff" stroke="#6366f1" stroke-width="2"/>
    <rect x="700" y="350" width="180" height="30" rx="6" fill="#6366f1"/>
    <text x="790" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">AlisFaturaRepository</text>
    <line x1="700" y1="395" x2="880" y2="395" stroke="#94a3b8"/>
    <text x="715" y="412" font-size="10" fill="#0f172a">+ model = AlisFatura</text>
    <line x1="700" y1="420" x2="880" y2="420" stroke="#94a3b8"/>
    <text x="715" y="438" font-size="10" fill="#0f172a">+ create_with_kalemler()</text>
    <text x="715" y="454" font-size="10" fill="#0f172a">+ tedarikci_faturalari(id)</text>
    <text x="715" y="470" font-size="10" fill="#0f172a">+ aylik_toplam(yil, ay)</text>
    <text x="715" y="486" font-size="10" fill="#0f172a">+ vadesi_gelen_faturalar()</text>
  </g>

  <!-- Inheritance lines (open triangles pointing to parent) -->
  <line x1="140" y1="350" x2="380" y2="270" stroke="#0f172a" stroke-width="1.8" marker-end="url(#inh)"/>
  <line x1="360" y1="350" x2="430" y2="270" stroke="#0f172a" stroke-width="1.8" marker-end="url(#inh)"/>
  <line x1="580" y1="350" x2="480" y2="270" stroke="#0f172a" stroke-width="1.8" marker-end="url(#inh)"/>
  <line x1="790" y1="350" x2="530" y2="270" stroke="#0f172a" stroke-width="1.8" marker-end="url(#inh)"/>

  <text x="450" y="540" text-anchor="middle" font-size="10" fill="#94a3b8">
    Boş üçgen oklar UML "extends/inheritance" ilişkisini gösterir.
  </text>
</svg>
