<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1f2937"/>
    </marker>
  </defs>

  <rect width="950" height="500" fill="#f8fafc"/>

  <text x="475" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">
    Yapay Zekâ Modülünün Sistem Mimarisi
  </text>
  <text x="475" y="54" text-anchor="middle" font-size="11" fill="#475569">
    İstemci taraflı (offline) ve sunucu taraflı (online) AI bileşenlerinin akışı
  </text>

  <!-- Tarayıcı kutusu -->
  <g filter="url(#sh)">
    <rect x="30" y="90" width="380" height="380" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="220" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">TARAYICI (Client-Side)</text>

    <!-- ai-engine.js -->
    <rect x="60" y="135" width="320" height="140" rx="6" fill="#fff" stroke="#3b82f6"/>
    <text x="220" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">ai-engine.js — Offline AI Modülü</text>
    <line x1="80" y1="170" x2="360" y2="170" stroke="#cbd5e1"/>
    <text x="75" y="190" font-size="11" fill="#0f172a">• nakitAkisiTahmini()</text>
    <text x="220" y="190" font-size="10" fill="#64748b">— Lineer Regresyon + MA</text>
    <text x="75" y="210" font-size="11" fill="#0f172a">• anomaliTespiti()</text>
    <text x="220" y="210" font-size="10" fill="#64748b">— Z-Score istatistiği</text>
    <text x="75" y="230" font-size="11" fill="#0f172a">• akilliFaturaOneri()</text>
    <text x="220" y="230" font-size="10" fill="#64748b">— Sıklık tabanlı öneri</text>
    <text x="75" y="252" font-size="10" font-style="italic" fill="#3b82f6">→ İnternet bağlantısı gerektirmez</text>

    <!-- Dashboard -->
    <rect x="60" y="295" width="320" height="155" rx="6" fill="#fff" stroke="#3b82f6"/>
    <text x="220" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Dashboard — index_firebase.html</text>
    <line x1="80" y1="330" x2="360" y2="330" stroke="#cbd5e1"/>
    <text x="75" y="350" font-size="11" fill="#0f172a">• "AI Analiz" butonu</text>
    <text x="75" y="370" font-size="11" fill="#0f172a">• 3 aylık nakit tahmin grafiği</text>
    <text x="75" y="390" font-size="11" fill="#0f172a">• Anomali rozetleri</text>
    <text x="75" y="410" font-size="11" fill="#0f172a">• Bildirimler paneli</text>
    <text x="75" y="430" font-size="10" font-style="italic" fill="#3b82f6">localStorage → OpenRouter API key</text>
  </g>

  <!-- Backend kutusu -->
  <g filter="url(#sh)">
    <rect x="450" y="90" width="280" height="200" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="590" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">FLASK BACKEND</text>

    <rect x="480" y="135" width="220" height="50" rx="6" fill="#fff" stroke="#22c55e"/>
    <text x="590" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">/api/ai/analyze</text>
    <text x="590" y="172" text-anchor="middle" font-size="10" fill="#16a34a">POST · Proxy + Auth</text>

    <rect x="480" y="200" width="220" height="50" rx="6" fill="#fff" stroke="#22c55e"/>
    <text x="590" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">/api/ai/ping</text>
    <text x="590" y="237" text-anchor="middle" font-size="10" fill="#16a34a">GET · Bağlantı testi</text>

    <text x="590" y="275" text-anchor="middle" font-size="10" font-style="italic" fill="#15803d">API anahtarı header'dan veya .env dosyasından</text>
  </g>

  <!-- OpenRouter -->
  <g filter="url(#sh)">
    <rect x="770" y="160" width="160" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="850" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">OpenRouter API</text>
    <text x="850" y="208" text-anchor="middle" font-size="10" fill="#92400e">mistralai/devstral</text>
    <text x="850" y="225" text-anchor="middle" font-size="10" fill="#92400e">2512:free</text>
    <text x="850" y="248" text-anchor="middle" font-size="9" font-style="italic" fill="#b45309">3. parti LLM servisi</text>
  </g>

  <!-- Veri kaynağı -->
  <g filter="url(#sh)">
    <rect x="450" y="320" width="280" height="130" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="590" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">Firebase Realtime DB</text>
    <text x="590" y="368" text-anchor="middle" font-size="11" fill="#9d174d">satisFaturalari · alisFaturalari</text>
    <text x="590" y="388" text-anchor="middle" font-size="11" fill="#9d174d">musteriler · urunler</text>
    <text x="590" y="415" text-anchor="middle" font-size="10" font-style="italic" fill="#be185d">AI modülleri buradan veri okur</text>
    <text x="590" y="432" text-anchor="middle" font-size="10" font-style="italic" fill="#be185d">(localStorage fallback ile)</text>
  </g>

  <!-- Oklar -->
  <!-- ai-engine -> Firebase (veri okuma) -->
  <line x1="380" y1="380" x2="450" y2="380" stroke="#ec4899" stroke-width="2" marker-end="url(#a)"/>
  <text x="395" y="372" font-size="9" fill="#be185d">veri</text>

  <!-- Dashboard -> Backend (AI Analiz) -->
  <line x1="380" y1="160" x2="480" y2="160" stroke="#22c55e" stroke-width="2" marker-end="url(#a)"/>
  <text x="395" y="153" font-size="9" fill="#166534">POST + key header</text>

  <!-- Backend -> OpenRouter -->
  <line x1="700" y1="210" x2="770" y2="210" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>
  <text x="715" y="203" font-size="9" fill="#92400e">HTTPS</text>

  <!-- Geri dönüş OpenRouter -> Backend -> Dashboard -->
  <line x1="770" y1="230" x2="700" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <line x1="480" y1="180" x2="380" y2="180" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="395" y="195" font-size="9" fill="#64748b" font-style="italic">JSON yanıt</text>

  <text x="475" y="485" text-anchor="middle" font-size="10" fill="#94a3b8">
    İstemci taraflı modüller bağlantı yokken çalışır; sunucu proxy yalnızca dış AI çağrılarında devreye girer.
  </text>
</svg>
