<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="one" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1f2937" stroke-width="2"/>
      <line x1="3" y1="0" x2="3" y2="10" stroke="#1f2937" stroke-width="2"/>
    </marker>
    <marker id="many" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M0,7 L10,0 M0,7 L10,14 M0,7 L10,7" stroke="#1f2937" stroke-width="2" fill="none"/>
    </marker>
  </defs>

  <rect width="1100" height="820" fill="#f8fafc"/>

  <text x="550" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    eMuhasebe Pro — Varlık-İlişki (ER) Diyagramı
  </text>
  <text x="550" y="55" text-anchor="middle" font-size="12" fill="#475569">
    10 ana tablo · Bire-Çok ilişkiler crow's foot notasyonu ile gösterilmiştir
  </text>

  <!-- Kullanicilar -->
  <g filter="url(#sh)">
    <rect x="40" y="90" width="200" height="160" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="40" y="90" width="200" height="32" rx="8" fill="#3b82f6"/>
    <text x="140" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">kullanicilar</text>
    <text x="55" y="140" font-size="11" font-weight="700" fill="#1e3a8a">PK  id</text>
    <text x="55" y="158" font-size="11" fill="#334155">username (UQ)</text>
    <text x="55" y="174" font-size="11" fill="#334155">email (UQ)</text>
    <text x="55" y="190" font-size="11" fill="#334155">password_hash</text>
    <text x="55" y="206" font-size="11" fill="#334155">role</text>
    <text x="55" y="222" font-size="11" fill="#334155">aktif</text>
    <text x="55" y="238" font-size="11" fill="#334155">olusturma_tarihi</text>
  </g>

  <!-- Musteriler (merkez) -->
  <g filter="url(#sh)">
    <rect x="430" y="90" width="240" height="220" rx="8" fill="#fff" stroke="#22c55e" stroke-width="2"/>
    <rect x="430" y="90" width="240" height="32" rx="8" fill="#22c55e"/>
    <text x="550" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">musteriler</text>
    <text x="445" y="140" font-size="11" font-weight="700" fill="#14532d">PK  id</text>
    <text x="445" y="158" font-size="11" fill="#334155">unvan</text>
    <text x="445" y="174" font-size="11" fill="#334155">vergi_no (UQ)</text>
    <text x="445" y="190" font-size="11" fill="#334155">vergi_dairesi</text>
    <text x="445" y="206" font-size="11" fill="#334155">email (UQ)</text>
    <text x="445" y="222" font-size="11" fill="#334155">telefon</text>
    <text x="445" y="238" font-size="11" fill="#334155">adres</text>
    <text x="445" y="254" font-size="11" fill="#334155">tip [CHECK]</text>
    <text x="445" y="270" font-size="11" fill="#334155">aktif</text>
    <text x="445" y="286" font-size="11" fill="#dc2626">silinme_tarihi  ◇</text>
    <text x="445" y="302" font-size="11" fill="#334155">olusturma_tarihi</text>
  </g>

  <!-- Urunler -->
  <g filter="url(#sh)">
    <rect x="860" y="90" width="200" height="200" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="860" y="90" width="200" height="32" rx="8" fill="#f59e0b"/>
    <text x="960" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">urunler</text>
    <text x="875" y="140" font-size="11" font-weight="700" fill="#78350f">PK  id</text>
    <text x="875" y="158" font-size="11" fill="#334155">kod (UQ)</text>
    <text x="875" y="174" font-size="11" fill="#334155">ad</text>
    <text x="875" y="190" font-size="11" fill="#334155">birim</text>
    <text x="875" y="206" font-size="11" fill="#334155">alis_fiyat   NUM(12,2)</text>
    <text x="875" y="222" font-size="11" fill="#334155">satis_fiyat  NUM(12,2)</text>
    <text x="875" y="238" font-size="11" fill="#334155">kdv_orani</text>
    <text x="875" y="254" font-size="11" fill="#334155">stok_miktari</text>
    <text x="875" y="270" font-size="11" fill="#dc2626">silinme_tarihi  ◇</text>
    <text x="875" y="286" font-size="11" fill="#334155">aktif</text>
  </g>

  <!-- Alis Faturalari -->
  <g filter="url(#sh)">
    <rect x="40" y="380" width="220" height="180" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2"/>
    <rect x="40" y="380" width="220" height="32" rx="8" fill="#6366f1"/>
    <text x="150" y="401" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">alis_faturalari</text>
    <text x="55" y="430" font-size="11" font-weight="700" fill="#312e81">PK  id</text>
    <text x="55" y="446" font-size="11" fill="#334155">fatura_no (UQ)</text>
    <text x="55" y="462" font-size="11" fill="#334155">fatura_tarihi</text>
    <text x="55" y="478" font-size="11" fill="#334155">vade_tarihi</text>
    <text x="55" y="494" font-size="11" font-weight="700" fill="#16a34a">FK  tedarikci_id →</text>
    <text x="55" y="510" font-size="11" fill="#334155">ara_toplam · kdv · genel</text>
    <text x="55" y="526" font-size="11" fill="#334155">durum</text>
    <text x="55" y="542" font-size="11" fill="#dc2626">silinme_tarihi  ◇</text>
  </g>

  <!-- Satis Faturalari -->
  <g filter="url(#sh)">
    <rect x="430" y="380" width="240" height="180" rx="8" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect x="430" y="380" width="240" height="32" rx="8" fill="#10b981"/>
    <text x="550" y="401" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">satis_faturalari</text>
    <text x="445" y="430" font-size="11" font-weight="700" fill="#064e3b">PK  id</text>
    <text x="445" y="446" font-size="11" fill="#334155">fatura_no (UQ)</text>
    <text x="445" y="462" font-size="11" fill="#334155">fatura_tarihi</text>
    <text x="445" y="478" font-size="11" fill="#334155">vade_tarihi</text>
    <text x="445" y="494" font-size="11" font-weight="700" fill="#16a34a">FK  musteri_id →</text>
    <text x="445" y="510" font-size="11" fill="#334155">ara_toplam · kdv · genel</text>
    <text x="445" y="526" font-size="11" fill="#334155">durum</text>
    <text x="445" y="542" font-size="11" fill="#dc2626">silinme_tarihi  ◇</text>
  </g>

  <!-- Iade Faturalari -->
  <g filter="url(#sh)">
    <rect x="840" y="380" width="220" height="180" rx="8" fill="#fff" stroke="#f97316" stroke-width="2"/>
    <rect x="840" y="380" width="220" height="32" rx="8" fill="#f97316"/>
    <text x="950" y="401" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">iade_faturalari</text>
    <text x="855" y="430" font-size="11" font-weight="700" fill="#7c2d12">PK  id</text>
    <text x="855" y="446" font-size="11" fill="#334155">fatura_no (UQ)</text>
    <text x="855" y="462" font-size="11" fill="#334155">fatura_tarihi</text>
    <text x="855" y="478" font-size="11" font-weight="700" fill="#16a34a">FK  firma_id →</text>
    <text x="855" y="494" font-size="11" fill="#334155">iade_turu</text>
    <text x="855" y="510" font-size="11" fill="#334155">referans_fatura_no</text>
    <text x="855" y="526" font-size="11" fill="#334155">iade_nedeni · durum</text>
    <text x="855" y="542" font-size="11" fill="#dc2626">silinme_tarihi  ◇</text>
  </g>

  <!-- Kalemler (3 tane alt alta) -->
  <g filter="url(#sh)">
    <rect x="40" y="620" width="220" height="150" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <rect x="40" y="620" width="220" height="28" rx="8" fill="#64748b"/>
    <text x="150" y="639" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">alis_fatura_kalemleri</text>
    <text x="55" y="666" font-size="10" font-weight="700" fill="#0f172a">PK  id</text>
    <text x="55" y="681" font-size="10" font-weight="700" fill="#16a34a">FK  fatura_id (CASCADE)</text>
    <text x="55" y="696" font-size="10" font-weight="700" fill="#16a34a">FK  urun_id</text>
    <text x="55" y="711" font-size="10" fill="#334155">miktar · birim_fiyat</text>
    <text x="55" y="726" font-size="10" fill="#334155">kdv_orani · aciklama</text>
    <text x="55" y="741" font-size="10" fill="#334155">indirim_orani</text>
  </g>

  <g filter="url(#sh)">
    <rect x="430" y="620" width="240" height="150" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <rect x="430" y="620" width="240" height="28" rx="8" fill="#64748b"/>
    <text x="550" y="639" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">satis_fatura_kalemleri</text>
    <text x="445" y="666" font-size="10" font-weight="700" fill="#0f172a">PK  id</text>
    <text x="445" y="681" font-size="10" font-weight="700" fill="#16a34a">FK  fatura_id (CASCADE)</text>
    <text x="445" y="696" font-size="10" font-weight="700" fill="#16a34a">FK  urun_id</text>
    <text x="445" y="711" font-size="10" fill="#334155">miktar · birim_fiyat</text>
    <text x="445" y="726" font-size="10" fill="#334155">kdv_orani · aciklama</text>
    <text x="445" y="741" font-size="10" fill="#334155">indirim_orani</text>
  </g>

  <g filter="url(#sh)">
    <rect x="840" y="620" width="220" height="150" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <rect x="840" y="620" width="220" height="28" rx="8" fill="#64748b"/>
    <text x="950" y="639" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">iade_fatura_kalemleri</text>
    <text x="855" y="666" font-size="10" font-weight="700" fill="#0f172a">PK  id</text>
    <text x="855" y="681" font-size="10" font-weight="700" fill="#16a34a">FK  fatura_id (CASCADE)</text>
    <text x="855" y="696" font-size="10" font-weight="700" fill="#16a34a">FK  urun_id</text>
    <text x="855" y="711" font-size="10" fill="#334155">miktar · birim_fiyat</text>
    <text x="855" y="726" font-size="10" fill="#334155">kdv_orani</text>
  </g>

  <!-- Audit Logs -->
  <g filter="url(#sh)">
    <rect x="40" y="280" width="200" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="140" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">audit_logs</text>
    <text x="55" y="325" font-size="10" fill="#7f1d1d">tablo_adi · kayit_id</text>
    <text x="55" y="340" font-size="10" fill="#7f1d1d">islem_tipi · JSON veriler</text>
    <text x="55" y="355" font-size="10" font-style="italic" fill="#991b1b">SQLAlchemy event listener ile otomatik</text>
  </g>

  <!-- Relations Musteri -> 3 Fatura -->
  <!-- Musteri -> Alis (tedarikci) -->
  <path d="M 430 200 Q 320 220 260 470" stroke="#16a34a" stroke-width="2" fill="none" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="280" y="320" font-size="11" font-weight="700" fill="#16a34a">1 : N (tedarikçi)</text>

  <!-- Musteri -> Satis -->
  <line x1="550" y1="310" x2="550" y2="380" stroke="#16a34a" stroke-width="2" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="558" y="350" font-size="11" font-weight="700" fill="#16a34a">1 : N (müşteri)</text>

  <!-- Musteri -> Iade -->
  <path d="M 670 200 Q 780 220 850 470" stroke="#16a34a" stroke-width="2" fill="none" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="760" y="320" font-size="11" font-weight="700" fill="#16a34a">1 : N (firma)</text>

  <!-- Fatura -> Kalem (cascade) -->
  <line x1="150" y1="560" x2="150" y2="620" stroke="#dc2626" stroke-width="2" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="160" y="595" font-size="10" font-weight="700" fill="#dc2626">1 : N · CASCADE</text>

  <line x1="550" y1="560" x2="550" y2="620" stroke="#dc2626" stroke-width="2" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="560" y="595" font-size="10" font-weight="700" fill="#dc2626">1 : N · CASCADE</text>

  <line x1="950" y1="560" x2="950" y2="620" stroke="#dc2626" stroke-width="2" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="960" y="595" font-size="10" font-weight="700" fill="#dc2626">1 : N · CASCADE</text>

  <!-- Urun -> Kalemler -->
  <path d="M 960 290 Q 990 380 670 695" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="5 3" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="990" y="500" font-size="10" font-weight="700" fill="#f59e0b">1 : N</text>

  <!-- Lejant -->
  <g transform="translate(280, 280)">
    <rect x="0" y="0" width="140" height="90" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="70" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Lejant</text>
    <text x="10" y="38" font-size="10" fill="#334155">UQ : Unique kısıtlaması</text>
    <text x="10" y="54" font-size="10" fill="#334155">FK : Foreign Key</text>
    <text x="10" y="70" font-size="10" fill="#dc2626">◇  : Soft delete alanı</text>
    <text x="10" y="84" font-size="10" fill="#334155">CASCADE : Bağlı silme</text>
  </g>

  <text x="550" y="795" text-anchor="middle" font-size="10" fill="#94a3b8">
    Hazırlayan: Meyrem Şenge · BMÜ326 Yazılım Mühendisliği · eMuhasebe Pro
  </text>
</svg>
