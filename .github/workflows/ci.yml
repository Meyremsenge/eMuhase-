name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      FLASK_CONFIG: testing
      PYTHONUNBUFFERED: "1"
      RATELIMIT_STORAGE_URI: redis://localhost:6379/0
      JWT_BLOCKLIST_REDIS_URL: redis://localhost:6379/1
      ENABLE_RATELIMIT_TESTS: "1"

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python ve pip sürümü
        run: |
          python --version
          pip --version

      - name: Lint (flake8)
        run: |
          flake8 app/ --max-line-length=120 --exclude=__pycache__ --count --show-source --statistics

      - name: Unit Testler (pytest)
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Loglari Arsivle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            logs/*.log
            logs/*.jsonl

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -s "$RENDER_DEPLOY_HOOK"
            echo "Deploy tetiklendi."
          else
            echo "RENDER_DEPLOY_HOOK tanımlı değil, deploy atlandı."
          fi
