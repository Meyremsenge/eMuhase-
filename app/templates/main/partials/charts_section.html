<!-- Charts Section -->
<div class="charts-section">
    <!-- Aylık Gelir-Gider Grafiği -->
    <div class="chart-card">
        <div class="chart-header">
            <div class="chart-title">
                <i class="fas fa-chart-line bg-primary"></i>
                <span>Aylık Gelir-Gider Analizi</span>
            </div>
            <div class="chart-filters">
                <button class="chart-filter-btn" data-period="6">6 Ay</button>
                <button class="chart-filter-btn active" data-period="12">12 Ay</button>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="revenueChart"></canvas>
            <div class="empty-state is-hidden" id="revenueChartEmpty">
                <i class="fas fa-chart-line"></i>
                <p>Veri yok</p>
            </div>
        </div>
    </div>

    <!-- Kategori Dağılımı -->
    <div class="chart-card">
        <div class="chart-header">
            <div class="chart-title">
                <i class="fas fa-chart-pie bg-success"></i>
                <span>Fatura Dağılımı</span>
            </div>
        </div>
        <div class="chart-container chart-container-sm">
            <canvas id="pieChart"></canvas>
            <div class="empty-state is-hidden" id="pieChartEmpty">
                <i class="fas fa-chart-pie"></i>
                <p>Veri yok</p>
            </div>
        </div>
        <div class="pie-legend" id="pieLegend"></div>
    </div>
</div>
