    <div class="mini-stat-card">
        <div class="mini-stat-icon blue"><i class="fas fa-file-invoice"></i></div>
        <div class="mini-stat-content">
            <div class="mini-stat-value" id="totalInvoices">0</div>
            <div class="mini-stat-label">Toplam Fatura</div>
        </div>
    </div>
    <div class="mini-stat-card">
        <div class="mini-stat-icon green"><i class="fas fa-check-circle"></i></div>

            <div class="mini-stat-value" id="paidInvoices">0</div>
            <div class="mini-stat-label">Ödenen Fatura</div>
        </div>
    </div>
    <div class="mini-stat-card">
        <div class="mini-stat-icon orange"><i class="fas fa-clock"></i></div>
        <div class="mini-stat-content">
            <div class="mini-stat-value" id="pendingInvoices">0</div>
            <div class="mini-stat-label">Bekleyen Fatura</div>
        </div>
