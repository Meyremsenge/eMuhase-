<!-- AI Analysis Section -->
<div class="ai-section">
    <div class="ai-card">
        <div class="ai-header">
            <div class="ai-title">
                <i class="fas fa-robot"></i>
                <span>Yapay Zeka Finansal Asistan</span>
            </div>
            <div class="ai-actions">
                <button class="ai-btn pro-btn" id="aiAnalyzeBtn" onclick="analyzeWithAI()">
                    <i class="fas fa-crown"></i>
                    <span>AI Analiz</span>
                </button>
            </div>
        </div>
        <div class="ai-content">
            <div class="ai-placeholder" id="aiPlaceholder">
                <i class="fas fa-chart-pie ai-placeholder-icon"></i>
                <p>Finansal verilerinizi analiz etmek için <strong>AI Analiz</strong> butonuna tıklayın.</p>
            </div>
            <div class="ai-loading is-hidden" id="aiLoading">
                <div class="ai-loading-dots">
                    <span></span><span></span><span></span>
                </div>
                <span>Yapay zeka analiz ediyor...</span>
                <div id="aiTimer" style="margin-top:.5rem;font-size:.85rem;color:var(--text-muted);font-variant-numeric:tabular-nums">
                    Geçen süre: <strong id="aiTimerVal">0</strong> sn
                    <span id="aiTimerHint" style="display:block;margin-top:.25rem;font-size:.78rem;opacity:.8">Genellikle 10–40 saniye sürer</span>
                </div>
            </div>
            <div class="ai-results" id="aiResults"></div>
        </div>
    </div>
</div>
